syntax = "proto3";

package agent;

option go_package = "grpc-agent/proto";

service AgentService {
  rpc Connect(stream AgentMessage) returns (stream AgentMessage);
}

message AgentMessage {
  string client_name = 1;
  string target_name = 5;
  string command = 2;
  string output = 3;
  bool is_response = 4;
}